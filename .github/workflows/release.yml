name: Build Release APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0

      - name: Build release APK
        env:
          # Gradle 9.6.0 conventions: clean parseable logs + no interactive prompts
          # in autonomous CI runs.
          NO_COLOR: "1"
          GRADLE_NON_INTERACTIVE: "true"
        run: ./gradlew --non-interactive assembleRelease

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfdaa  # v3.0.0
        with:
          files: app/build/outputs/apk/release/app-release.apk
